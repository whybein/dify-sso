# Nginx Ingress Controller 기반 Dify SSO 설정
# - Nginx Ingress Controller가 클러스터에 설치되어 있어야 합니다
# - 도메인: baollmdev.oilbank.co.kr (환경에 맞게 수정)
#
# 적용 순서:
#   1. Authelia Deployment/Service 배포
#   2. dify-sso Deployment/Service 배포
#   3. 이 Ingress 적용: kubectl apply -f k8s-ingress-nginx.yaml -n llm-dev

---
# ============================================================
# Ingress 1: /signin 리다이렉트 + dify-sso 경로
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baollm-sso-ing
  namespace: llm-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    # /signin 접근 시 SSO 로그인으로 302 리다이렉트
    nginx.ingress.kubernetes.io/server-snippet: |
      location = /signin {
          return 302 /console/api/enterprise/sso/oidc/login?is_login=true;
      }
    # ALB에서 넘어오는 경우 HTTPS 보장
    nginx.ingress.kubernetes.io/proxy-set-headers: "llm-dev/custom-headers"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  rules:
    - host: baollmdev.oilbank.co.kr
      http:
        paths:
          # 관리자 로그인 (Dify 기본 이메일/비밀번호)
          - path: /admin-login
            pathType: Exact
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          # SSO 인증 엔드포인트
          - path: /console/api/enterprise/sso(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          # Enterprise workspace
          - path: /console/api/enterprise/workspace(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          # Enterprise webapp
          - path: /console/api/enterprise/webapp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          # WebApp SSO
          - path: /api/enterprise/sso(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          # WebApp 접근 제어
          - path: /webapp(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          - path: /app-sso-setting(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          - path: /sso(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          - path: /check-credential-policy-compliance
            pathType: Exact
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000

---
# ============================================================
# Ingress 2: dify-sso Exact 경로 (system-features, features, info)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baollm-sso-exact-ing
  namespace: llm-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  rules:
    - host: baollmdev.oilbank.co.kr
      http:
        paths:
          - path: /console/api/system-features
            pathType: Exact
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          - path: /console/api/features
            pathType: Exact
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000
          - path: /info
            pathType: Exact
            backend:
              service:
                name: dify-sso-svc
                port:
                  number: 8000

---
# ============================================================
# Ingress 3: Authelia (/auth 경로)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baollm-authelia-ing
  namespace: llm-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  rules:
    - host: baollmdev.oilbank.co.kr
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: authelia-svc
                port:
                  number: 9091

---
# ============================================================
# Ingress 4: Dify 본체 (기존 서비스 - 우선순위 낮음)
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: baollm-dify-ing
  namespace: llm-dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  rules:
    - host: baollmdev.oilbank.co.kr
      http:
        paths:
          - path: /console/api
            pathType: Prefix
            backend:
              service:
                name: opencode-api-dev
                port:
                  number: 5001
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: opencode-api-dev
                port:
                  number: 5001
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: opencode-api-dev
                port:
                  number: 5001
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: opencode-api-dev
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opencode-web-dev
                port:
                  number: 3000
