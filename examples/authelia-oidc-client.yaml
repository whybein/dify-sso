# Authelia OIDC client configuration for Dify SSO
#
# Add this to your Authelia configuration.yml under identity_providers.oidc.clients
#
# Prerequisites:
#   - Authelia v4.38+ (PKCE S256 support)
#   - server.path: 'auth' in Authelia config (for path-based setup)
#
# Generate client_secret hash:
#   docker run --rm authelia/authelia:latest \
#     authelia crypto hash generate argon2 --password 'your-plain-secret'
#
# Then use the plain secret in dify-sso .env (OIDC_CLIENT_SECRET)
# and the hash below in client_secret.

identity_providers:
  oidc:
    clients:
      - client_id: dify
        client_name: Dify
        client_secret: '$argon2id$v=19$m=65536,t=3,p=4$...'  # Replace with your generated hash
        public: false
        authorization_policy: two_factor      # or one_factor
        redirect_uris:
          - https://dify.example.com/console/api/enterprise/sso/oidc/callback
        scopes:
          - openid
          - profile
          - email
        response_types:
          - code
        token_endpoint_auth_method: client_secret_post
        pkce_challenge_method: S256
