# Nginx configuration for Dify SSO
#
# Add these location blocks to your Dify server block.
# They must be placed ABOVE the existing Dify proxy blocks
# (e.g., location /console/api, location /).
#
# Assumes:
#   - Authelia running at http://authelia:9091 with server.path: 'auth'
#   - dify-sso running at http://dify-sso:8000
#   - All services on the same Docker network

# ── Authelia (/auth path) ──
location /auth {
    proxy_pass http://authelia:9091;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Login bypass — skip Dify login page, redirect to SSO ──
location = /signin {
    return 302 /console/api/enterprise/sso/oidc/login?is_login=true;
}

# ── Admin login — Dify native email/password login ──
location = /admin-login {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── SSO auth endpoints → dify-sso ──
location ~ ^/console/api/enterprise/sso/ {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── System features API → dify-sso ──
location = /console/api/system-features {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Features API → dify-sso ──
location = /console/api/features {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Enterprise info → dify-sso ──
location = /info {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── WebApp SSO → dify-sso ──
location ~ ^/api/enterprise/sso/ {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── WebApp access control → dify-sso ──
location ~ ^/(webapp/|app-sso-setting|sso/|check-credential-policy-compliance) {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Workspace API → dify-sso ──
location ~ ^/console/api/enterprise/workspace/ {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── WebApp permission/access-mode → dify-sso ──
location ~ ^/console/api/enterprise/webapp/ {
    proxy_pass http://dify-sso:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
